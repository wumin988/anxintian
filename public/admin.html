<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>天鹿良食 | 运营后台</title>
  <meta name="description" content="天鹿良食后台，管理商品、库存、图片和订单。">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-admin">
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>

  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="天鹿良食首页">
        <span class="brand-mark">天鹿</span>
        <span class="brand-copy">
          <strong>TIANLU GOOD FOOD</strong>
          <small>Operations admin</small>
        </span>
      </a>
      <nav class="site-nav" aria-label="后台导航">
        <a href="#product-form">新建商品</a>
        <a href="#product-table">商品列表</a>
        <a href="#orders-panel">订单</a>
        <a href="index.html">返回商城</a>
      </nav>
      <div class="header-actions">
        <a class="cart-button" href="index.html">前台站点 <span>Live</span></a>
      </div>
    </header>

    <main>
      <section class="page-intro" id="admin-login-panel">
        <div>
          <p class="eyebrow">ADMIN LOGIN</p>
          <h1>后台登录</h1>
        </div>
        <p>先输入后台密码，再进行商品上新、库存管理、图片上传和订单查看。</p>
      </section>

      <section class="checkout-card" id="login-card">
        <form id="admin-login-form">
          <div class="field-grid">
            <label class="field full">
              <span>后台密码</span>
              <input name="password" type="password" required placeholder="请输入后台密码">
            </label>
          </div>
          <div class="cart-actions">
            <button class="primary-button" type="submit">登录后台</button>
          </div>
          <p class="form-note">当前默认密码是 <code>tianlugoodfood123</code>，上线后建议改环境变量 <code>ADMIN_PASSWORD</code>。</p>
        </form>
      </section>

      <div id="admin-dashboard" hidden>
      <section class="page-intro">
        <div>
          <p class="eyebrow">OPERATIONS ADMIN</p>
          <h1>运营后台</h1>
        </div>
        <p>在这里可以直接上新、改价、调库存、换图，也能查看最近订单和履约节奏。</p>
      </section>

      <section class="admin-layout">
        <article class="checkout-card" id="product-form">
          <div class="page-intro" style="padding:0 0 18px;align-items:center;">
            <div>
              <h2 style="margin:0;">商品表单</h2>
            </div>
            <button class="outline-button" type="button" id="reset-form">新建商品</button>
          </div>
          <form id="admin-product-form">
            <input type="hidden" name="productId">
            <div class="field-grid">
              <label class="field">
                <span>商品名</span>
                <input name="name" required placeholder="例如：晨露有机叶菜箱">
              </label>
              <label class="field">
                <span>分类</span>
                <select name="category" required>
                  <option value="时令蔬菜箱">时令蔬菜箱</option>
                  <option value="生态水果">生态水果</option>
                  <option value="健康轻食">健康轻食</option>
                  <option value="有机常备">有机常备</option>
                </select>
              </label>
              <label class="field">
                <span>售价</span>
                <input name="price" type="number" min="0" required>
              </label>
              <label class="field">
                <span>原价</span>
                <input name="originalPrice" type="number" min="0" required>
              </label>
              <label class="field">
                <span>标签</span>
                <input name="badge" required placeholder="例如：本周鲜配">
              </label>
              <label class="field">
                <span>评分</span>
                <input name="rating" type="number" step="0.1" min="0" max="5" required>
              </label>
              <label class="field">
                <span>评价数</span>
                <input name="reviews" type="number" min="0" required>
              </label>
              <label class="field">
                <span>是否精选</span>
                <select name="featured">
                  <option value="true">是</option>
                  <option value="false">否</option>
                </select>
              </label>
              <label class="field">
                <span>强调色</span>
                <input name="accent" required placeholder="#7b9449">
              </label>
              <label class="field">
                <span>背景渐变</span>
                <input name="visual" required placeholder="linear-gradient(...)">
              </label>
              <label class="field full">
                <span>商品图 URL</span>
                <input name="image" type="url" placeholder="https://...">
              </label>
              <div class="field full">
                <span>上传商品图</span>
                <div class="upload-row">
                  <input id="image-file" type="file" accept="image/png,image/jpeg,image/webp">
                  <button class="outline-button" type="button" id="upload-image-button">上传图片</button>
                </div>
                <div class="image-preview" id="image-preview"></div>
              </div>
              <label class="field full">
                <span>一句话描述</span>
                <input name="description" required placeholder="适合 2-3 人家庭的一周基础蔬菜补给。">
              </label>
              <label class="field full">
                <span>商品故事</span>
                <textarea name="story" required placeholder="说明产地、适合人群和为什么值得加入每周餐桌。"></textarea>
              </label>
              <label class="field full">
                <span>商品亮点</span>
                <textarea name="details" required placeholder="一行一个亮点，例如：&#10;产地：上海崇明合作农场&#10;认证：批次有机认证可查&#10;建议：适合每周固定配送"></textarea>
              </label>
              <label class="field full">
                <span>规格库存</span>
                <textarea name="inventory" required placeholder='JSON 格式，例如：{"轻享装":12,"家庭装":8}'></textarea>
              </label>
            </div>
            <div class="cart-actions">
              <button class="primary-button" type="submit" id="submit-product">发布商品</button>
              <button class="secondary-button" type="button" id="cancel-edit">取消编辑</button>
            </div>
          </form>
        </article>

        <aside class="summary-card" id="orders-panel">
          <h2>最近订单</h2>
          <div id="orders-list" class="admin-order-list"></div>
        </aside>
      </section>

      <section class="checkout-card" id="product-table" style="margin-top:24px;">
        <div class="page-intro" style="padding:0 0 18px;align-items:center;">
          <div>
            <h2 style="margin:0;">商品列表</h2>
          </div>
          <div class="summary-actions">
            <span class="pill" id="product-count">0 件商品</span>
            <button class="outline-button" type="button" id="logout-button">退出后台</button>
          </div>
        </div>
        <div class="admin-product-list" id="admin-product-list"></div>
      </section>
      </div>
    </main>
  </div>

  <div class="toast" id="status-message" aria-live="polite"></div>
  <script src="storefront.js" defer></script>
  <script src="admin.js" defer></script>
</body>
</html>
