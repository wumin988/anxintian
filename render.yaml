services:
  - type: web
    name: anxintian
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: DATA_DIR
        value: /var/data
    disk:
      name: tianlu-goodfood-data
      mountPath: /var/data
      sizeGB: 1
